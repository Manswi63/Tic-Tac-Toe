version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip

  pre_build:
    commands:
      - echo "Checking files..."
      - ls -l

  build:
    commands:
      - echo "Validating Python code..."
      - python -m py_compile app.py

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
